name: Docker image build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Login to DockerHub
        run: |
          echo ${{ secrets.DOCKERTOKEN }} | docker login -u "YOUR_USERNAME" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t angelkwatra/fastapi-app:v0.1 .

      - name: Push Docker Image
        run: |
          docker push angelkwatra/fastapi-app:v0.1